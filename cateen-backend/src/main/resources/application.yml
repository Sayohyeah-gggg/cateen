 # ============================================
# Spring Boot 多环境配置 - 主配置文件
# ============================================
# 本地开发：使用 dev 环境
# 生产部署：使用 prod 环境
# ============================================

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

spring:
  application:
    name: cateen-backend
  
  # 激活环境配置（本地测试使用dev）
  profiles:
    active: dev
  
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: NON_NULL
    property-naming-strategy: SNAKE_CASE
  
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus配置
mybatis-plus:
  # XML映射文件位置
  mapper-locations: classpath*:/mapper/xml/**/*.xml
  # 实体类包路径
  type-aliases-package: com.xawl.cateen.entity
  # 全局配置
  global-config:
    # 数据库相关配置
    db-config:
      # 主键类型（使用数据库自增）
      id-type: ASSIGN_ID
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（默认为1）
      logic-delete-value: 1
      # 逻辑未删除值（默认为0）
      logic-not-delete-value: 0
    banner: false
  # 配置
  configuration:
    # 是否开启自动驼峰命名规则映射
    map-underscore-to-camel-case: true
    # 开启Mybatis二级缓存，默认为 true
    cache-enabled: false
    # 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  # 密钥
  secret: your-jwt-secret-key
  # 过期时间（毫秒）24小时
  expiration: 86400000
  # Token前缀
  token-prefix: Bearer 
  # Token请求头名称
  header: Authorization

# 日志配置
logging:
  level:
    com.xawl.cateen: debug
    com.xawl.cateen.mapper: debug
    dev.langchain4j: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  charset:
    console: GBK

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: "zh_cn"
    "swagger-model-name": "数据模型"

# 微信小程序配置
wechat:
  mini:
    appid: your-appid
    secret: your-appsecret
# MinIO 配置（用于图片上传；桶：small=小程序，admin=管理端，video=视频）
minio:
  enabled: true
  endpoint: http://localhost:9000
  public-url: http://localhost:9000
  access-key: your-minio-access-key
  secret-key: your-minio-secret-key
  bucket:
    small: small
    admin: admin
    video: video

# AI配置 - 使用阿里云通义千问
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: your-qwen-api-key
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: your-qwen-api-key
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: your-qwen-api-key
      model-name: text-embedding-v3
      log-requests: true
      log-responses: true
      max-segments-per-batch: 10

  community:
    redis:
      host: localhost
      port: 6379

# 自定义配置 - AI系统消息
custom:
  ai:
    system:
      message:
        food-recommendation: |
          你是一位专业的美食推荐助手，专门为用户推荐合适的美食。除了美食问题其他概不回答

          请根据用户的需求和可用美食数据，为用户推荐最合适的美食。
          推荐时请考虑：
          1. 用户的口味偏好
          2. 营养搭配
          3. 用餐场景
          4. 特殊需求（如素食、低脂等）

          请用友好、专业的语气回复，推荐2-3道美食，并说明推荐理由。
          如果用户输入不够具体，请主动询问更多信息以便提供更精准的推荐。

          回复格式：
          🤖 根据您的需求，我为您推荐以下美食：

          🍽️ **推荐美食1** - 推荐理由
          🍽️ **推荐美食2** - 推荐理由
          🍽️ **推荐美食3** - 推荐理由

          💡 **小贴士**：如果您有特殊需求或偏好，请告诉我，我会为您提供更精准的推荐！
        chat-response: |
          你是一位专业的美食推荐助手。请根据用户的输入，提供友好、专业的回复。

          请用温暖、专业的语气回复用户，如果用户询问美食相关问题，请提供有用的建议。
          如果用户没有具体问题，请主动介绍你的功能并询问用户需要什么帮助。

          回复要求：
          1. 语气友好、专业
          2. 内容实用、具体
          3. 适当使用emoji增加亲和力
          4. 如果用户问题不够具体，主动询问更多信息

