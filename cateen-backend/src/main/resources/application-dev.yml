# ============================================
# 开发环境配置（本地测试使用）
# ============================================
server:
  port: 8080
spring:
  # 数据源配置（根据你本地MySQL配置修改）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cateen?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 666Shiyuhang  # 👈 修改为你本地MySQL的密码
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
  
  # Redis配置（开发环境，可选）
  redis:
    host: localhost
    port: 6379
    password:  # 如果有密码就填写
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# 文件上传配置（开发环境使用绝对路径，避免 Tomcat 临时目录问题）
# 注意：小程序无法访问 localhost，需改为本机局域网IP，例如 http://192.168.x.x:8080
upload:
  path: D:/xawl_total/xawl_cateen/uploads
  base-url: http://192.168.10.4:8080

# 日志配置（开发环境打印详细日志）
logging:
  level:
    com.xawl.cateen: debug
    com.xawl.cateen.mapper: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

