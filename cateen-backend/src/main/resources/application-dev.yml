# ============================================
# 开发环境配置（本地测试使用）
# ============================================
server:
  port: 8080
spring:
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cateen?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 666Shiyuhang
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin

# MinIO 配置（用于图片上传；桶：small=小程序，admin=管理端，video=视频）
minio:
  enabled: true
  endpoint: http://localhost:9000
  public-url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket:
    small: small
    admin: admin
    video: video

# 日志配置（开发环境打印详细日志）
logging:
  level:
    com.xawl.cateen: debug
    com.xawl.cateen.mapper: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

